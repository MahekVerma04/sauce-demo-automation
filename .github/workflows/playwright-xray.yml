name: Playwright Tests & Jira Xray Upload

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  run-tests-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code from GitHub into the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Install testing dependencies and Playwright browsers
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pytest requests
        playwright install --with-deps

    # 4. Run your Playwright tests and generate the JUnit XML report
    - name: Run Playwright tests
      run: |
        pytest --junitxml=results/junit-report.xml
      continue-on-error: true # Ensures the pipeline keeps running to upload results even if tests fail

    # 5. Execute your custom Python script to upload results to Jira Xray
    - name: Upload results to Jira Xray
      env:
        XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
        XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
      run: |
        python upload_to_xray.py
